name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact: buddy-reroller.exe
          - os: macos-latest
            artifact: buddy-reroller
          - os: ubuntu-latest
            artifact: buddy-reroller
    runs-on: ${{ matrix.os }}
    steps:
      - uses: oven-sh/setup-bun@v2
      - uses: actions/checkout@v4
      - name: Inject PRO modules
        env:
          PRO_IMPL: ${{ secrets.PRO_IMPL_TS }}
          PRO_SEARCH_IMPL: ${{ secrets.PRO_SEARCH_IMPL_TS }}
          PRO_SECRET_KEY: ${{ secrets.PRO_SECRET_KEY_TS }}
        run: |
          printf '%s' "$PRO_IMPL" > src/pro/pro-impl.ts
          printf '%s' "$PRO_SEARCH_IMPL" > src/pro/pro-search-impl.ts
          printf '%s' "$PRO_SECRET_KEY" > src/pro/secret-key.ts
        shell: bash
      - run: bun install
      - run: bun run build
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
